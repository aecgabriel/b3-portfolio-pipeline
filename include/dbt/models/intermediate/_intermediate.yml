version: 2

models:
  - name: int_trades_clean
    description: Trades with total cost and sell value calculated per lot
    columns:
      - name: ticker
        tests:
          - not_null
      - name: buy_quantity
        tests:
          - not_null
      - name: avg_buy_price
        tests:
          - not_null
      - name: total_buy_cost
        tests:
          - not_null
      - name: _reference_period
        tests:
          - not_null

  - name: int_weighted_avg_price
    description: Weighted average purchase price per ticker across all trade records
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
      - name: total_shares_bought
        description: Total shares purchased historically
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: weighted_avg_price
        description: Weighted average price must be positive
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false

  - name: int_all_equity_positions
    description: Union of stocks and ETFs aggregated per ticker per month across brokers
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - ticker
            - _reference_period
    columns:
      - name: ticker
        tests:
          - not_null
      - name: asset_type
        tests:
          - not_null
          - accepted_values:
              values: ['stock', 'etf']
      - name: total_quantity
        description: Quantity must be positive
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: total_current_value
        tests:
          - not_null
      - name: _reference_period
        tests:
          - not_null

  - name: int_monthly_portfolio_value
    description: Monthly total portfolio value across all asset types
    columns:
      - name: asset_class
        tests:
          - not_null
          - accepted_values:
              values: ['equity', 'treasury', 'fixed_income']
      - name: total_value
        tests:
          - not_null
      - name: _reference_period
        tests:
          - not_null
